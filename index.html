<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff8f2" />
  <title>お金の健康診断 | fumiyu_moneylife</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell" id="app">
    <section class="screen home-screen" aria-labelledby="home-title">
      <div class="soft-orb orb-1"></div>
      <div class="soft-orb orb-2"></div>
      <div class="soft-orb orb-3"></div>
      <div class="sparkle sparkle-1">✦</div>
      <div class="sparkle sparkle-2">✧</div>
      <div class="sparkle sparkle-3">♡</div>

      <header class="brand-row">
        <p class="brand-name">fumiyu_moneylife</p>
        <a class="secret-link" href="#password" aria-label="特典ページへ進む">
          <span class="lock-icon">🔒</span>
          特典ページへ
        </a>
      </header>

      <div class="hero-copy">
        <p class="eyebrow">3分でわかる！</p>
        <h1 id="home-title"><span>お金の</span><br />健康診断</h1>
        <p class="lead">あなたのお金の<span>現在地</span>がわかります</p>
      </div>

      <div class="mascot-area" aria-hidden="true">
        <div class="speech-bubble">一緒に<br />お金の<span>体力</span>を<br />チェックしよう！</div>
        <img class="mascot mascot-home" src="assets/images/mascot-home.png" alt="" />
      </div>

      <section class="power-card" aria-label="チェックできる5つの力">
        <h2>5つの力をチェック！</h2>
        <div class="power-grid">
          <div class="power-item"><div class="power-icon icon-household">▦</div><p>家計力</p></div>
          <div class="power-item"><div class="power-icon icon-save">♣</div><p>貯める力</p></div>
          <div class="power-item"><div class="power-icon icon-protect">♢</div><p>守る力</p></div>
          <div class="power-item"><div class="power-icon icon-grow">↗</div><p>増やす力</p></div>
          <div class="power-item"><div class="power-icon icon-action">●</div><p>行動力</p></div>
        </div>
      </section>

      <div class="meta-row" aria-label="診断の目安">
        <div class="meta-pill"><span>◷</span>約3分で完了！</div>
        <div class="meta-pill"><span>▤</span>全30問でしっかり診断！</div>
      </div>

      <button class="primary-button breathe" type="button" id="startButton">
        診断をはじめる <span aria-hidden="true">→</span>
      </button>
      <p class="foot-note">気軽にサクッとチェックしてみよう！ ♡</p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
